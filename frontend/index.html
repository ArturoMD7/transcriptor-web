<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OCR Pemex Tool</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="container">
  <h1>📄 OCR Transcriptor</h1>
  <p class="subtitle">PDF → Word automático</p>

  <div class="card">

    <input type="file" id="fileInput" accept="application/pdf">

    <div class="row">
      <input type="number" id="pagInicio" placeholder="Inicio" value="1">
      <input type="number" id="pagFin" placeholder="Fin (opcional)">
    </div>

    <button id="btnProcesar" onclick="enviar()">🚀 Procesar</button>

    <div id="loader" class="loader hidden"></div>
    <p id="status"></p>

  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
